criteria:
  - name: "Positive owner earnings yield on EV (normalised) >= 5%"
    left:
      metric: oey_ev_norm
    operator: ">="
    right:
      value: 0.05

  - name: "EV / EBIT <= 18 (basic operating valuation sanity check)"
    left:
      metric: ev_to_ebit
    operator: "<="
    right:
      value: 18

  - name: "Graham multiplier <= 35 (avoid extreme price vs earnings and tangible book)"
    left:
      metric: graham_multiplier
    operator: "<="
    right:
      value: 35
